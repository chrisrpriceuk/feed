name: Update TikTok Feed

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install yt-dlp
        run: python3 -m pip install --upgrade yt-dlp

      - name: Generate TikTok feed data
        env:
          TIKTOK_USERNAME: fallowfpv
          TIKTOK_MAX_ITEMS: "24"
        run: node scripts/update-tiktok-feed.mjs

      - name: Commit changes
        run: |
          if git diff --quiet tiktok-feed.json; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tiktok-feed.json
          git commit -m "chore: update TikTok feed data"
          git push
